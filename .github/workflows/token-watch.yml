name: Token Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Restore bot state
        uses: actions/cache/restore@v4
        with:
          path: |
            data
            charts
          key: token-watch-${{ github.run_id }}
          restore-keys: |
            token-watch-

      - name: Run scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CHAINS: solana,ethereum
          RUN_ONCE: "1"
          POLL_SECONDS: "300"
          MAX_PAIR_AGE_HOURS: "72"
          MIN_LIQUIDITY_USD: "10000"
          MIN_VOLUME_1H_USD: "5000"
          ALERT_SCORE_MIN: "65"
          RUG_RISK_MAX: "55"
          ALERT_COOLDOWN_MINUTES: "180"
        run: npm run once

      - name: Save bot state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data
            charts
          key: token-watch-${{ github.run_id }}
